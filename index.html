<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon — crest logo. Swap for logo.png if you prefer the PNG export. -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%logo.svg" />

    <!-- Primary SEO -->
    <title>Daanvira Labs — Software Development &amp; Digital Marketing Agency in Colombo</title>
    <meta
      name="description"
      content="Daanvira Labs builds high-performance websites, apps and custom software — and grows them with SEO, paid ads, content and brand design. One team, end to end. Colombo, Sri Lanka."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Daanvira Labs" />
    <meta property="og:title" content="Daanvira Labs — Building software and brands that grow" />
    <meta
      property="og:description"
      content="Software development, digital marketing and creative — delivered by one team in Colombo, Sri Lanka."
    />
    <!-- [PLACEHOLDER] og:image needs a full absolute URL (crawlers fetch it
         server-side, they don't resolve relative paths) — fill in once the
         site has a final domain, e.g. https://daanviralabs.github.io/Daanvira-Labs/logo.svg -->
    <meta property="og:image" content="https://daanviralabs.github.io/Daanvira-Labs/logo.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Daanvira Labs — Building software and brands that grow" />
    <meta
      name="twitter:description"
      content="Software development, digital marketing and creative — delivered by one team in Colombo, Sri Lanka."
    />

    <meta name="theme-color" content="#ffffff" />

    <!-- Google Fonts: Playfair Display (headings) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
