<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Daanvira Labs crest">
  <!--
    PLACEHOLDER crest logo — coral shield and a "D".
    Replace this file (or drop your real crest as /public/logo.png and update
    business.logo in src/config/business.js) when your final artwork is ready.
  -->
  <defs>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97362" />
      <stop offset="1" stop-color="#ef4444" />
    </linearGradient>
  </defs>

  <!-- Shield outline -->
  <path
    d="M60 7 L103 22 V57 C103 87 84 105 60 113 C36 105 17 87 17 57 V22 Z"
    fill="#fffdf6"
    stroke="url(#coral)"
    stroke-width="5"
    stroke-linejoin="round"
  />

  <!-- Monogram -->
  <text
    x="60"
    y="82"
    font-family="Playfair Display, Georgia, serif"
    font-size="68"
    font-weight="700"
    fill="url(#coral)"
    text-anchor="middle"
  >D</text>
</svg>
